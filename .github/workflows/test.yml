name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test
        env:
          # Force UTC so date-sensitive tests (rotation, retention cutoff) behave
          # identically regardless of the runner's local TZ.
          TZ: UTC
