<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Chat — Setting Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .container { width: 380px; -webkit-app-region: no-drag; }
    h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 32px; }
    .steps { display: flex; flex-direction: column; gap: 16px; }

    .step {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #222;
      transition: border-color 0.3s, background 0.3s;
    }
    .step.active { border-color: #e5a00d; background: rgba(229, 160, 13, 0.05); }
    .step.done { border-color: #2a2a2a; }
    .step.failed { border-color: #dc2626; background: rgba(220, 38, 38, 0.05); }
    .step.skipped { border-color: #2a2a2a; opacity: 0.6; }

    .icon {
      width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-pending { width: 8px; height: 8px; border-radius: 50%; background: #555; }
    .icon-spinner {
      width: 16px; height: 16px; border: 2px solid #555;
      border-top-color: #e5a00d; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .icon-check svg { width: 16px; height: 16px; fill: #22c55e; }
    .icon-cross svg { width: 16px; height: 16px; fill: #dc2626; }
    .icon-skip svg { width: 16px; height: 16px; fill: #888; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .step-text { flex: 1; }
    .step-title { font-size: 14px; font-weight: 500; color: #e5e5e5; }
    .step-message { font-size: 12px; color: #888; margin-top: 2px; }

    .retry-area { text-align: center; margin-top: 24px; }
    .retry-btn {
      background: #e5a00d; color: #fff; border: none; padding: 8px 24px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; display: none;
    }
    .retry-btn:hover { background: #cc8f0c; }
    .retry-btn.visible { display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Movie Chat</h1>
    <p class="subtitle">Setting things up for you...</p>

    <div class="steps">
      <div class="step" id="step-brew">
        <div class="icon"><div class="icon-pending"></div></div>
        <div class="step-text">
          <div class="step-title">Package manager</div>
          <div class="step-message">Homebrew</div>
        </div>
      </div>
      <div class="step" id="step-plex">
        <div class="icon"><div class="icon-pending"></div></div>
        <div class="step-text">
          <div class="step-title">Plex Media Server</div>
          <div class="step-message">Your movie library</div>
        </div>
      </div>
      <div class="step" id="step-transmission">
        <div class="icon"><div class="icon-pending"></div></div>
        <div class="step-text">
          <div class="step-title">Transmission</div>
          <div class="step-message">Download manager</div>
        </div>
      </div>
      <div class="step" id="step-ollama">
        <div class="icon"><div class="icon-pending"></div></div>
        <div class="step-text">
          <div class="step-title">AI Assistant</div>
          <div class="step-message">Local AI model</div>
        </div>
      </div>
      <div class="step" id="step-config">
        <div class="icon"><div class="icon-pending"></div></div>
        <div class="step-text">
          <div class="step-title">Configuration</div>
          <div class="step-message">Connecting everything together</div>
        </div>
      </div>
      <div class="step" id="step-model" style="display:none">
        <div class="icon"><div class="icon-spinner"></div></div>
        <div class="step-text">
          <div class="step-title">AI Model</div>
          <div class="step-message">Downloading in the background...</div>
        </div>
      </div>
    </div>

    <div class="retry-area">
      <button class="retry-btn" id="retryBtn" onclick="window.setupAPI.retry()">Try again</button>
    </div>
  </div>

  <script>
    const CHECK_SVG = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5l-4.5-4.5 1.41-1.41L10 13.67l7.09-7.09 1.41 1.41L10 16.5z"/></svg>';
    const CROSS_SVG = '<svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>';
    const SKIP_SVG = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h2v-2h-2v2zm0-4h2V7h-2v6z"/></svg>';

    function updateStep(stepId, status, message) {
      const el = document.getElementById('step-' + stepId);
      if (!el) return;
      // Show the model step when it first receives an event (hidden by default)
      if (stepId === 'model') el.style.display = '';

      el.className = 'step ' + status;
      const icon = el.querySelector('.icon');
      const msg = el.querySelector('.step-message');

      if (status === 'installing') {
        icon.innerHTML = '<div class="icon-spinner"></div>';
      } else if (status === 'done') {
        icon.innerHTML = '<div class="icon-check">' + CHECK_SVG + '</div>';
      } else if (status === 'failed') {
        icon.innerHTML = '<div class="icon-cross">' + CROSS_SVG + '</div>';
      } else if (status === 'skipped') {
        icon.innerHTML = '<div class="icon-skip">' + SKIP_SVG + '</div>';
      }

      if (message) msg.textContent = message;
    }

    window.setupAPI.onProgress((data) => {
      updateStep(data.step, data.status, data.message);
    });

    window.setupAPI.onComplete((data) => {
      document.querySelector('.subtitle').textContent = data.success
        ? 'All done! Starting Movie Chat...'
        : 'Setup finished with some issues.';

      if (!data.success) {
        document.getElementById('retryBtn').classList.add('visible');
      }
    });
  </script>
</body>
</html>
